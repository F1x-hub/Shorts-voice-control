<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Голосовое управление Shorts</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 320px;
            padding: 15px;
            text-align: center;
            background-color: #f9f9f9;
            color: #333;
            position: relative;
        }
        h2 {
            margin-top: 0;
            font-size: 18px;
        }
        .info {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: background-color 0.2s;
        }

        .btn-start {
            background-color: #4CAF50 !important;
        }
        .btn-start:hover:not(:disabled) {
            background-color: #45a049 !important;
        }
        .btn-stop {
            background-color: #f44336 !important;
        }
        .btn-stop:hover:not(:disabled) {
            background-color: #da190b !important;
        }
        button:disabled {
            background-color: #cccccc;
            color: #666666;
            cursor: not-allowed;
        }
        #status {
            margin-top: 15px;
            padding: 10px;
            font-size: 13px;
            min-height: 40px;
            border-radius: 4px;
            background-color: #eeeeee;
        }
        .settings-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none !important;
            border: none;
            font-size: 20px;
            line-height: 1;
            padding: 0;
            margin: 0;
            cursor: pointer;
            color: #666;
            transition: color 0.2s, transform 0.2s;
            text-decoration: none;
        }
        .settings-btn:hover {
            color: #333;
            transform: scale(1.1);
        }
        
        /* Стили для тогглера */
        .toggle-container {
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 20px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #4CAF50;
        }
        input:checked + .slider:before {
            transform: translateX(16px);
        }
        .toggle-label {
            font-size: 13px;
            color: #333;
            cursor: pointer;
            user-select: none;
        }
    </style>
</head>
<body>
    <button id="settingsBtn" class="settings-btn" title="Настройки">⚙️</button>
    <h2>Голосовое управление Shorts</h2>
    <p class="info">Включите микрофон и произносите команды для управления видео (например, «следующее» или «предыдущее»).</p>
    
    <div>
        <button id="stop" class="btn-stop" disabled>Остановить</button>
    </div>
    
    <div class="toggle-container">
        <label class="toggle-switch">
            <input type="checkbox" id="autoSkipToggle">
            <span class="slider"></span>
        </label>
        <label class="toggle-label" for="autoSkipToggle">Авто-пропуск просмотренных Shorts</label>
    </div>
    
    <div id="status">Инициализация...</div>

    <script src="popup.js"></script>
</body>
</html>
